<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AR Doodle Fun</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0f172a}
body{font-family:system-ui,sans-serif;display:flex;flex-direction:column}

/* Stage */
#stage{position:relative;flex:1;overflow:hidden;background:#1a1a2e}
#stage canvas{position:absolute;top:0;left:0;z-index:3;touch-action:none}
#stage video{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:1}
#stage .bg-img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:1}

/* Overlay */
#startOverlay{position:fixed;inset:0;z-index:999;display:flex;align-items:center;justify-content:center;background:rgba(15,23,42,.95)}
.overlay-box{background:#1e293b;border:1px solid rgba(255,255,255,.15);border-radius:20px;padding:36px 28px;max-width:360px;text-align:center;color:#e2e8f0;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.overlay-box h2{font-size:22px;margin-bottom:8px}
.overlay-box p{font-size:14px;color:#94a3b8;margin-bottom:22px;line-height:1.6}
.overlay-box button{padding:14px 36px;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;border:0;background:#38bdf8;color:#0f172a;font-family:inherit}

/* Toolbar */
#toolbar{display:flex;align-items:center;gap:8px;padding:10px 14px;background:rgba(15,23,42,.95);border-top:1px solid rgba(255,255,255,.12);overflow-x:auto;scrollbar-width:none;z-index:10;flex-shrink:0;-webkit-overflow-scrolling:touch}
#toolbar::-webkit-scrollbar{display:none}

/* Buttons */
.tb{display:flex;align-items:center;gap:6px;padding:11px 16px;border-radius:12px;font-size:13px;font-weight:700;border:2px solid transparent;cursor:pointer;white-space:nowrap;font-family:inherit;min-height:44px;background:rgba(255,255,255,.08);color:#e2e8f0;transition:all .15s;touch-action:manipulation}
.tb:active{transform:scale(.95)}
.tb.active{border-color:#38bdf8;background:rgba(56,189,248,.15);color:#38bdf8}
.tb.draw{color:#fff;background:rgba(56,189,248,.3)}
.tb.erase{color:#ef4444}
.tb.sticker{color:#a78bfa}
.tb svg{width:20px;height:20px;flex-shrink:0;pointer-events:none}

/* Colors */
.color-row{display:flex;gap:6px;align-items:center}
.cdot{width:36px;height:36px;border-radius:50%;border:3px solid transparent;cursor:pointer;flex-shrink:0;transition:all .15s;touch-action:manipulation}
.cdot:active{transform:scale(.9)}
.cdot.active{border-color:#fff;transform:scale(1.15);box-shadow:0 0 12px rgba(255,255,255,.4)}

/* Stickers */
.sticker-row{display:flex;gap:4px;align-items:center}
.sbtn{font-size:26px;padding:6px 8px;border-radius:10px;border:2px solid transparent;background:transparent;cursor:pointer;line-height:1;touch-action:manipulation}
.sbtn:active{transform:scale(.9)}
.sbtn.active{border-color:#a78bfa;background:rgba(167,139,250,.2)}

/* Slider */
.sz{display:flex;align-items:center;gap:8px}
.sz input{width:80px;height:28px;accent-color:#38bdf8}
.sz span{font-size:11px;color:#94a3b8;white-space:nowrap}

/* Spacer */
.s1{flex:1}
.sep{color:rgba(255,255,255,.2);margin:0 2px}

/* Recording */
.rec{border-color:#ef4444!important;background:rgba(239,68,68,.2)!important;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* Toast */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(16,185,129,.95);color:#fff;padding:10px 24px;border-radius:12px;font-size:13px;font-weight:700;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}
#toast.show{opacity:1}

/* Guide text on canvas */
#guide{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:2;color:rgba(255,255,255,.3);font-size:15px;text-align:center;pointer-events:none;transition:opacity .5s}

/* Responsive */
@media(max-width:480px){
  .tb{padding:10px 12px;font-size:12px;gap:4px}
  .tb svg{width:18px;height:18px}
  .cdot{width:32px;height:32px}
  .sbtn{font-size:24px}
}
</style>
</head>
<body>

<div id="startOverlay">
  <div class="overlay-box">
    <h2>🎨 AR Doodle Fun</h2>
    <p>Gambar langsung di atas kamera. Klik <b>Mulai AR</b>, izinkan kamera, lalu sentuh & gambar di layar.</p>
    <button id="startBtn">📷 Mulai AR</button>
  </div>
</div>

<div id="stage">
  <video id="camVideo" playsinline autoplay muted></video>
  <canvas id="drawCanvas"></canvas>
  <div id="guide">👆 Sentuh & gambar di sini</div>
</div>

<div id="toolbar">
  <button class="tb draw active" data-t="draw">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>
    Gambar
  </button>
  <button class="tb erase" data-t="erase">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-9H9m2-4h4"/></svg>
    Hapus
  </button>
  <button class="tb sticker" data-t="sticker">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.121 17.804A13.937 13.937 0 0112 16c2.5 0 4.847.655 6.879 1.804M15 10a3 3 0 11-6 0 3 3 0 016 0zm6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
    Stiker
  </button>
  <span class="sep">|</span>
  <div class="color-row" id="colorRow"></div>
  <span class="sep">|</span>
  <div class="sz"><span>Ukuran</span><input type="range" id="sizeIn" min="2" max="30" value="5"><span id="sizeVal">5</span></div>
  <div class="s1"></div>
  <div class="sticker-row" id="stickerRow"></div>
  <div class="s1"></div>
  <button class="tb" id="btnClear" style="color:#f59e0b">🗑️ Bersihkan</button>
  <button class="tb" id="btnSave" style="color:#10b981">📸 Foto</button>
  <button class="tb" id="btnRec" style="color:#f59e0b">⏺️ Video</button>
</div>

<div id="toast"></div>

<script>
(function(){
'use strict';
var stage = document.getElementById('stage');
var canvas = document.getElementById('drawCanvas');
var ctx = canvas.getContext('2d');
var video = document.getElementById('camVideo');
var guide = document.getElementById('guide');
var toast = document.getElementById('toast');
var overlay = document.getElementById('startOverlay');

var COLORS = ['#FFFFFF','#FF0000','#FF6600','#FFCC00','#00FF00','#00CCFF','#0066FF','#9933FF','#FF00FF','#FF69B4','#00FFFF','#808080','#000000'];
var STICKERS = ['😊','😂','😍','🤩','👍','❤️','🌟','🚀','🌈','🍕','🐱','🐶','🌸','🎉','💡','🔥','👻','🤖','👑','💯','✨','🦋','🎈','🍭'];

var color = '#FFFFFF', size = 5, tool = 'draw', sticker = null;
var drawing = false, camReady = false;
var recorder = null, chunks = [], recording = false;

// ── Canvas sizing ──
function fit(){
  var w = stage.clientWidth, h = stage.clientHeight;
  if(w === 0 || h === 0){ w = window.innerWidth; h = window.innerHeight - 60; }
  canvas.width = w; canvas.height = h;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  ctx.lineJoin = 'round'; ctx.lineCap = 'round';
  ctx.strokeStyle = color; ctx.lineWidth = size;
}
fit();
window.addEventListener('resize', fit);
// Also refit after camera starts
setTimeout(fit, 500);
setTimeout(fit, 1500);

// ── Position ──
function pos(e){
  var r = canvas.getBoundingClientRect();
  var cx, cy;
  if(e.touches && e.touches.length){ cx = e.touches[0].clientX; cy = e.touches[0].clientY; }
  else { cx = e.clientX; cy = e.clientY; }
  return { x: cx - r.left, y: cy - r.top };
}

// ── Draw ──
function down(e){
  e.preventDefault(); e.stopPropagation();
  fit();
  guide.style.opacity = '0';
  if(tool === 'sticker'){
    if(sticker){
      var p = pos(e);
      ctx.font = (size * 10) + 'px Arial';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillStyle = color;
      ctx.fillText(sticker, p.x, p.y);
      sticker = null; setTool('draw');
    }
    return;
  }
  if(tool === 'erase'){
    ctx.globalCompositeOperation = 'destination-out';
    ctx.lineWidth = size * 2;
  } else {
    ctx.globalCompositeOperation = 'source-over';
    ctx.strokeStyle = color;
    ctx.lineWidth = size;
  }
  drawing = true;
  var p = pos(e);
  // Draw dot immediately
  ctx.fillStyle = tool === 'erase' ? 'rgba(0,0,0,0)' : color;
  ctx.beginPath(); ctx.arc(p.x, p.y, size/2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.moveTo(p.x, p.y);
}

function move(e){
  if(!drawing) return;
  e.preventDefault(); e.stopPropagation();
  var p = pos(e);
  ctx.lineTo(p.x, p.y); ctx.stroke();
}

function up(){
  if(!drawing) return;
  drawing = false; ctx.closePath();
}

canvas.addEventListener('pointerdown', down);
canvas.addEventListener('pointermove', move);
canvas.addEventListener('pointerup', up);
canvas.addEventListener('pointerleave', up);
canvas.addEventListener('pointercancel', up);
// Also bind touch directly as fallback
canvas.addEventListener('touchstart', down, {passive:false});
canvas.addEventListener('touchmove', move, {passive:false});
canvas.addEventListener('touchend', up);
canvas.addEventListener('touchcancel', up);

// ── Tools ──
function setTool(t){
  tool = t;
  document.querySelectorAll('.tb').forEach(function(b){ b.classList.remove('active'); });
  var btns = document.querySelectorAll('[data-t]');
  btns.forEach(function(b){ if(b.dataset.t === t) b.classList.add('active'); });
  fit();
  if(t === 'draw'){ ctx.globalCompositeOperation = 'source-over'; ctx.strokeStyle = color; ctx.lineWidth = size; canvas.style.cursor = 'crosshair'; }
  else if(t === 'erase'){ canvas.style.cursor = 'cell'; }
  else if(t === 'sticker'){ canvas.style.cursor = 'pointer'; }
}

document.querySelectorAll('[data-t]').forEach(function(b){
  b.addEventListener('click', function(){ setTool(this.dataset.t); });
});

// ── Colors ──
var cr = document.getElementById('colorRow');
COLORS.forEach(function(c){
  var d = document.createElement('div');
  d.className = 'cdot'; if(c === color) d.classList.add('active');
  d.style.backgroundColor = c;
  d.addEventListener('click', function(){
    color = c;
    document.querySelectorAll('.cdot').forEach(function(x){ x.classList.remove('active'); });
    d.classList.add('active');
    if(tool === 'draw'){ ctx.strokeStyle = c; ctx.globalCompositeOperation = 'source-over'; }
  });
  cr.appendChild(d);
});

// ── Size ──
var si = document.getElementById('sizeIn');
var sv = document.getElementById('sizeVal');
si.addEventListener('input', function(){
  size = parseInt(this.value); sv.textContent = size;
  if(tool === 'draw') ctx.lineWidth = size;
  if(tool === 'erase') ctx.lineWidth = size * 2;
});

// ── Stickers ──
var sr = document.getElementById('stickerRow');
STICKERS.forEach(function(s){
  var b = document.createElement('button');
  b.className = 'sbtn'; b.textContent = s; b.title = s;
  b.addEventListener('click', function(){
    sticker = s; setTool('sticker');
    document.querySelectorAll('.sbtn').forEach(function(x){ x.classList.remove('active'); });
    b.classList.add('active'); canvas.style.cursor = 'grab';
  });
  sr.appendChild(b);
});

// ── Clear ──
document.getElementById('btnClear').addEventListener('click', function(){
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  show('Kanvas bersih ✅');
});

// ── Save ──
document.getElementById('btnSave').addEventListener('click', function(){
  var a = document.createElement('a');
  a.download = 'doodle_' + Date.now() + '.png';
  a.href = canvas.toDataURL('image/png');
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  show('Foto tersimpan 📸');
});

// ── Record ──
var recBtn = document.getElementById('btnRec');
recBtn.addEventListener('click', function(){
  if(!camReady){ show('Kamera belum siap 🚫'); return; }
  if(recording){ stopRec(); } else { startRec(); }
});

function startRec(){
  if(typeof MediaRecorder === 'undefined'){ show('Browser tidak mendukung ⚠️'); return; }
  var stream;
  try { stream = stage.captureStream ? stage.captureStream(30) : canvas.captureStream(30); }
  catch(e){ stream = canvas.captureStream(30); }
  if(!stream){ show('Tidak bisa merekam ⚠️'); return; }
  chunks = [];
  try { recorder = new MediaRecorder(stream, {mimeType:'video/webm;codecs=vp9'}); }
  catch(e){ try { recorder = new MediaRecorder(stream, {mimeType:'video/webm'}); } catch(e2){ recorder = new MediaRecorder(stream); } }
  recorder.ondataavailable = function(e){ if(e.data.size>0) chunks.push(e.data); };
  recorder.onstop = function(){
    var blob = new Blob(chunks, {type:'video/webm'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.download = 'doodle_' + Date.now() + '.webm';
    a.href = url; document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url); show('Video tersimpan 🎬');
  };
  recorder.start(); recording = true;
  recBtn.classList.add('rec'); recBtn.innerHTML = '⏹️ Stop';
}

function stopRec(){
  if(recorder && recorder.state !== 'inactive') recorder.stop();
  recording = false;
  recBtn.classList.remove('rec'); recBtn.innerHTML = '⏺️ Video';
}

// ── Camera ──
document.getElementById('startBtn').addEventListener('click', function(){
  fit();
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    fallbackBg(); return;
  }
  navigator.mediaDevices.getUserMedia({
    video: {facingMode:'environment', width:{ideal:1280}, height:{ideal:720}}, audio:false
  }).then(function(stream){
    video.srcObject = stream;
    video.onloadedmetadata = function(){
      video.play(); camReady = true; fit();
    };
    overlay.style.display = 'none';
    show('Kamera siap! Sentuh layar untuk menggambar 🎨');
    setTimeout(fit, 300);
    setTimeout(fit, 1000);
  }).catch(function(err){
    console.error(err);
    fallbackBg();
  });
});

function fallbackBg(){
  video.style.display = 'none';
  overlay.style.display = 'none';
  camReady = true;
  stage.style.background = '#2d3a4a url(https://picsum.photos/seed/doodle/800/450) center/cover no-repeat';
  fit();
  setTimeout(fit, 100);
  show('Mode latar statis — sentuh layar untuk menggambar 🎨');
}

// ── Toast ──
var toastTimer;
function show(msg){
  toast.textContent = msg; toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ toast.classList.remove('show'); }, 2500);
}

// ── Init ──
setTool('draw');
})();
</script>
</body>
</html>
